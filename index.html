<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neotix IT Solutions Hero Section</title>
    <style>
        /* --- CSS Variables & Reset --- */
        :root {
            --bg-dark: #1a0b05; /* Deep brownish-black */
            --bg-gradient-start: #2e140a;
            --bg-gradient-end: #0d0502;
            --primary-orange: #ff5722; /* Bright orange for accents */
            --text-white: #ffffff;
            --text-grey: #cccccc;
            --card-glass: rgba(255, 255, 255, 0.1);
            --font-family: 'Inter', sans-serif; /* Using a modern sans-serif */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: radial-gradient(circle at top left, #4a2211, transparent 40%),
                        radial-gradient(circle at bottom right, #3d1a0d, transparent 40%),
                        linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            background-color: var(--bg-dark);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Decorative background blobs */
        body::before {
            content: '';
            position: absolute;
            top: 10%;
            left: 5%;
            width: 50px;
            height: 50px;
            background: var(--primary-orange);
            opacity: 0.2;
            filter: blur(30px);
            border-radius: 50%;
            z-index: -1;
        }

        /* --- Layout Container --- */
        .container {
            width: 90%;
            max-width: 1200px;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 50px 0;
            gap: 40px;
        }

        /* --- Left Column: Content --- */
        .hero-content {
            flex: 1;
            max-width: 600px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--primary-orange);
        }
        
        .badge-icon {
            margin-right: 8px;
            fill: var(--primary-orange);
            width: 16px;
            height: 16px;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 25px;
        }

        .subtext {
            font-size: 1.1rem;
            color: var(--text-grey);
            line-height: 1.6;
            margin-bottom: 40px;
            max-width: 480px;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 14px 28px;
            border-radius: 30px;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--primary-orange);
            color: var(--text-white);
            border: none;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-white);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-icon {
            margin-left: 10px;
            fill: currentColor;
            width: 14px;
            height: 14px;
        }

        /* Rating Area */
        .rating-area {
            display: flex;
            flex-direction: column;
        }

        .rating-score {
            display: flex;
            align-items: baseline;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .rating-score span {
            font-size: 1.2rem;
            color: var(--text-grey);
            font-weight: 400;
            margin-left: 5px;
        }

        .rating-stars {
            color: var(--primary-orange);
            margin-left: 15px;
            font-size: 1.2rem;
        }

        .rating-text {
            color: var(--text-grey);
            font-size: 0.95rem;
        }

        /* --- Right Column: Image & Overlays --- */
        .hero-image-container {
            flex: 1;
            position: relative;
            max-width: 550px;
        }

        .main-image {
            width: 100%;
            height: auto;
            border-radius: 20px;
            display: block;
            /* Using a placeholder image that matches the reference */
            content: url('https://images.unsplash.com/photo-1553877522-43269d4ea984?q=80&w=1000&auto=format&fit=crop');
            object-fit: cover;
        }

        /* Play Button Overlay */
        .play-button-wrapper {
            position: absolute;
            top: 12%;
            right: -30px;
            width: 140px;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            /* ensure it's above the image */
            z-index: 2; 
        }

        .play-btn-center {
            width: 60px;
            height: 60px;
            background: var(--primary-orange);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            box-shadow: 0 4px 15px rgba(255, 87, 34, 0.4);
            cursor: pointer;
        }
        
        .play-icon {
            fill: var(--text-white);
            width: 20px;
            height: 20px;
            margin-left: 3px; /* Optical adjustment */
        }

        /* Circular Text Animation */
        .circular-text {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: rotateText 15s linear infinite;
        }

        .circular-text span {
            position: absolute;
            left: 50%;
            top: 0;
            transform-origin: 0 70px; /* Radius of the circle */
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.8);
        }

        @keyframes rotateText {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Testimonial Glassmorphism Card */
        .testimonial-card {
            position: absolute;
            bottom: 30px;
            left: -30px;
            background: var(--card-glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 20px;
            width: 260px;
            z-index: 2;
        }

        .avatars {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .avatars img, .add-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 3px solid var(--bg-gradient-end); /* Match bg to simulate cutout */
            margin-left: -15px;
            object-fit: cover;
        }

        .avatars img:first-child {
            margin-left: 0;
        }

        .add-avatar {
            background: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-white);
            font-size: 1.2rem;
        }

        .card-text {
            font-weight: 700;
            font-size: 1.1rem;
            line-height: 1.4;
        }

        /* --- Responsive Design --- */
        @media (max-width: 1024px) {
            h1 { font-size: 3.5rem; }
            .container { gap: 20px; }
        }

        @media (max-width: 868px) {
            .container {
                flex-direction: column;
                text-align: center;
                padding-top: 80px;
            }

            .hero-content, .subtext {
                max-width: 100%;
            }
            
            .badge { margin-left: auto; margin-right: auto; }

            .button-group {
                justify-content: center;
            }

            .rating-area {
                align-items: center;
                margin-bottom: 40px;
            }

            .hero-image-container {
                width: 100%;
                max-width: 450px;
                /* Reset negative margins for mobile layout */
                margin-left: 30px;
                margin-right: 30px;
            }

            .play-button-wrapper {
                right: -15px;
                top: 5%;
                transform: scale(0.8);
            }
            
            .testimonial-card {
                left: -15px;
                bottom: 15px;
                transform: scale(0.9);
                transform-origin: bottom left;
            }
        }
        
        @media (max-width: 480px) {
            h1 { font-size: 2.8rem; }
             .button-group { flex-direction: column; gap: 15px; }
             .btn { width: 100%; justify-content: center; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="hero-content">
            <div class="badge">
                <svg class="badge-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
                NO.1 IT SOLUTION COMPANY
            </div>
            <h1>Best Intelligent In Transforms Business.</h1>
            <p class="subtext">Your growth is our mission. Neotix helps startup and enterprise unlock their full potential.</p>
            
            <div class="button-group">
                <a href="#" class="btn btn-primary">
                    Get Started Now
                    <svg class="btn-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M16.01 11H4v2h12.01v3L20 12l-3.99-4z"/></svg>
                </a>
                <a href="#" class="btn btn-secondary">
                    Let's Talk
                    <svg class="btn-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6.4 18L16 8.4V17h2V5H6v2h8.6L5 16.6z"/></svg>
                </a>
            </div>

            <div class="rating-area">
                <div class="rating-score">
                    4.90<span>/5.00</span>
                    <div class="rating-stars">★★★★★</div>
                </div>
                <p class="rating-text">Rated by global businesses</p>
            </div>
        </div>

        <div class="hero-image-container">
            <img class="main-image" alt="IT Professional with laptop">

            <div class="play-button-wrapper">
                <div class="circular-text" id="circular-text">
                    PLAY OUR PROMOTIONAL VIDEO 
                </div>
                <div class="play-btn-center">
                    <svg class="play-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7z"/></svg>
                </div>
            </div>

            <div class="testimonial-card">
                <div class="avatars">
                    <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="Client 1">
                    <img src="https://randomuser.me/api/portraits/men/45.jpg" alt="Client 2">
                    <img src="https://randomuser.me/api/portraits/women/65.jpg" alt="Client 3">
                    <div class="add-avatar">+</div>
                </div>
                <p class="card-text">Our Clients Ambitious Businesses.</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const textElement = document.getElementById('circular-text');
            // Get the text content and trim whitespace
            const text = textElement.innerText.trim();
            // Clear existing content
            textElement.innerHTML = '';
            
            // Calculate the angle between each letter for a full circle (360deg)
            const angleStep = 360 / text.length;

            // Loop through each character and create a span
            for (let i = 0; i < text.length; i++) {
                const span = document.createElement('span');
                span.innerText = text[i];
                // Rotate the span based on its index
                span.style.transform = `rotate(${i * angleStep}deg)`;
                textElement.appendChild(span);
            }
        });
    </script>
</body>
</html>
